<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map It — Scrolly Telling</title>
<style>
  :root{
    --bg:#f2f1ef;
    --ink:#2b2b2b;
    --img-floor:.50;   /* Deckkraft-Boden inaktives Bild  */
    --txt-floor:.30;   /* Deckkraft-Boden inaktiver Text  */
    --scale-floor:.78; /* Skalier-Boden inaktives Bild    */
  }

  *{box-sizing:border-box;margin:0;padding:0}

  html{
    scroll-snap-type:y mandatory;   /* Einrasten beim Scrollen */
    background:var(--bg);
  }
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  /* Tall track erzeugt die Scroll-Laenge (4 Frames -> 400vh) */
  .track{position:relative;height:400vh}

  /* Unsichtbare Snap-Marker bei 0/100/200/300vh -> Einrasten */
  .snap{position:absolute;left:0;width:1px;height:1px;scroll-snap-align:start;scroll-snap-stop:always}

  /* Sticky-Buehne: bleibt gepinnt und haelt alle Frames gestapelt & zentriert */
  .stage{
    position:sticky;
    top:0;
    height:100vh;
    overflow:hidden;
    pointer-events:none;
  }

  .frame{
    position:absolute;
    inset:0;
  }

  /* Bild = die Karte (schattenlos). Wird skaliert + verschoben + Opacity animiert.
     Vertikale Mitte des Bildes = Karten-Mitte -> einfach auf 50% zentriert.       */
  .frame__img{
    position:absolute;
    left:50%;
    top:50%;
    width:min(58vw,1280px);
    max-height:82vh;
    object-fit:contain;
    transform-origin:center center;
    will-change:transform,opacity;
    transition:transform .45s cubic-bezier(.22,.61,.36,1),
               opacity   .45s cubic-bezier(.22,.61,.36,1);
  }

  /* Karten-Look fuer Frame 1-3: abgerundete Ecken + weicher, dezenter Schatten.
     Frame 4 (Geraete, transparenter Rand) bekommt bewusst KEINE Karten-Behandlung. */
  .frame__img--card{
    border-radius:14px;
    box-shadow:0 30px 60px -12px rgba(0,0,0,.18),
               0 8px 20px -8px rgba(0,0,0,.12);
  }

  /* Text: NUR Position aendert sich, Groesse bleibt konstant, eigene Opacity.
     Rechts neben dem Bild, vertikal auf der Karten-Mitte (Buehnen-Anker).       */
  .frame__text{
    position:absolute;
    left:50%;
    top:50%;
    width:min(30vw,360px);
    will-change:transform,opacity;
    transition:transform .45s cubic-bezier(.22,.61,.36,1),
               opacity   .45s cubic-bezier(.22,.61,.36,1);
  }
  .frame__text h2{
    font-size:clamp(1.6rem,2.5vw,2.4rem);
    font-weight:600;
    line-height:1.2;
    letter-spacing:-.01em;
  }

  /* Hochformat (Mobile + Tablet hochkant): Text oben fix, Bild breit & zentriert,
     gestapeltes Overlay. Positionierung/Animation kommt aus dem Script. */
  @media (orientation:portrait){
    .frame__img{width:90vw;max-height:66vh}
    .frame__text{
      top:7%;
      left:6%;
      width:88vw;
      text-align:left;
      transition:opacity .25s ease;   /* kurzes Ueberblenden beim Wechsel */
    }
    .frame__text h2{font-size:clamp(1.7rem,5.4vw,2.9rem)}
  }

  /* Reduzierte Bewegung: kein Snap-Zwang, sanfte statische Darstellung */
  @media (prefers-reduced-motion:reduce){
    html{scroll-snap-type:none;scroll-behavior:auto}
    .frame__img,.frame__text{transition:none}
  }
</style>
</head>
<body>

  <!-- Track: erzeugt Scroll-Laenge + sticky Buehne + Snap-Marker -->
  <div class="track">
    <!-- Sticky-Buehne mit allen Frames -->
    <div class="stage" aria-hidden="false">
    <figure class="frame" data-i="0">
      <img class="frame__img frame__img--card" src="assets/frame1.png" alt="aggloobersee: Infrastruktur-Massnahmen der Agglomerationsprogramme auf einer Karte">
      <figcaption class="frame__text"><h2>Digital planen und kommunizieren</h2></figcaption>
    </figure>
    <figure class="frame" data-i="1">
      <img class="frame__img frame__img--card" src="assets/frame2.png" alt="Stadt Duebendorf: Themenkarte mit Orten des lokalen Lebens">
      <figcaption class="frame__text"><h2>Das Leben vor Ort zeigen</h2></figcaption>
    </figure>
    <figure class="frame" data-i="2">
      <img class="frame__img frame__img--card" src="assets/frame3.png" alt="Platzhalter-Karte fuer die Energieplanung">
      <figcaption class="frame__text"><h2>Energieplanung zugaenglich machen</h2></figcaption>
    </figure>
    <figure class="frame" data-i="3">
      <img class="frame__img" src="assets/frame4.png" alt="Mobilitaetskarte Aargau auf Laptop, Tablet und Smartphone">
      <figcaption class="frame__text"><h2>Mitsprache ermoeglichen</h2></figcaption>
    </figure>
    </div><!-- /stage -->

    <!-- Snap-Marker: rasten bei 0/100/200/300vh ein -->
    <div class="snap" style="top:0"></div>
    <div class="snap" style="top:100vh"></div>
    <div class="snap" style="top:200vh"></div>
    <div class="snap" style="top:300vh"></div>
  </div><!-- /track -->

<script>
(function(){
  const frames = Array.from(document.querySelectorAll('.frame')).map(f => ({
    el:   f,
    img:  f.querySelector('.frame__img'),
    text: f.querySelector('.frame__text'),
    i:    +f.dataset.i,
  }));
  const N = frames.length;

  const SCALE_FLOOR = .78;
  const IMG_FLOOR   = .50;
  const TXT_FLOOR   = .30;

  // Hochformat (Mobile/Tablet hochkant): gestapeltes Overlay
  const P_ANCHOR    = .48;   // vertikaler Anker des aktiven Bildes (Anteil vh)
  const P_RISE      = 1.10;  // Aufstiegsdistanz des naechsten Bildes (x Bildhoehe)
  const P_SCALE     = .90;   // Skalier-Boden des transparenten Bildes
  const P_IMG_FLOOR = .40;   // Deckkraft-Boden des naechsten (transparenten) Bildes

  const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
  const lerp  = (a,b,t) => a + (b-a)*t;

  // px-Werte, die von vw/vh-CSS abhaengen -> bei Resize neu lesen
  const HGAP = 44;      // horizontaler Abstand Bild <-> Text
  const VGAP = 0.05;    // vertikaler Abstand ZWISCHEN Frames (Anteil der Bildhoehe-Basis)
  let OFFSET_PX = 0, IMG_HALF = 0, IMG_SHIFT = 0, TEXT_W = 0, ANCHOR_PX = 0;
  function readMetrics(){
    const portrait = window.matchMedia('(orientation: portrait)').matches;

    // WICHTIG: unskalierte Masse via offsetWidth/offsetHeight (ignorieren die
    // Scale-Transform der Frames). getBoundingClientRect() waere um die aktuelle
    // Skalierung verfaelscht und wuerde Text/Bild ueberlappen lassen.
    const im   = frames[0].img;
    const AR   = (im.naturalWidth && im.naturalHeight)
                 ? im.naturalWidth/im.naturalHeight : 1776/1012;
    const boxW = im.offsetWidth  || Math.min(window.innerWidth*.58, 1280);
    const boxH = im.offsetHeight || boxW/AR;
    // sichtbare Bildmasse bei scale=1 (beruecksichtigt object-fit:contain / max-height)
    const imgW = Math.min(boxW, boxH*AR);
    const imgH = Math.min(boxH, boxW/AR);

    TEXT_W   = frames[0].text.offsetWidth || Math.min(window.innerWidth*.30, 360);
    IMG_HALF = imgW/2;   // halbe (unskalierte) Bildbreite -> fuer die skalierte rechte Kante

    if(portrait){
      // Hochformat: Bild horizontal zentriert; naechstes Bild steigt von unten auf.
      IMG_SHIFT = 0;
      ANCHOR_PX = (P_ANCHOR - 0.5) * window.innerHeight;   // vertikaler Anker (relativ zur Mitte)
      OFFSET_PX = imgH * P_RISE;                           // Aufstiegsdistanz des naechsten Bildes
    }else{
      // Desktop/Querformat: Filmstreifen nebeneinander, konstanter Abstand (nie ueberlappend).
      IMG_SHIFT = (TEXT_W + HGAP) / 2;
      ANCHOR_PX = 0;
      OFFSET_PX = imgH + VGAP*window.innerHeight;
    }
    return portrait;
  }

  let portrait = false;

  function render(){
    const p = clamp(window.scrollY / window.innerHeight, 0, N-1);

    const active = Math.round(p);   // fuer Hochformat: welcher Frame gilt als aktiv

    frames.forEach(fr => {

      if(portrait){
        // === HOCHFORMAT: Text oben (diskreter Wechsel), Bilder gestapelt (naechstes deckt aktives) ===
        // Text bleibt fix oben; nur der aktive ist sichtbar -> Wechsel erst beim Einrasten.
        fr.text.style.transform = 'none';
        fr.text.style.opacity   = (fr.i === active) ? 1 : 0;

        // Bild: aktiv/vergangen bleibt fix & deckend; kommendes steigt von unten auf,
        //       waechst auf volle Groesse und wird deckend -> legt sich ueber das aktive.
        const e = fr.i - p;               // >0 = kommt noch (unten), <=0 = aktiv/vergangen
        let scale = 1, imgOp = 1, offY = 0;
        if(e > 0){
          scale = lerp(1, P_SCALE, clamp(e,0,1));                 // transparent -> etwas kleiner
          imgOp = (e <= 1) ? lerp(1, P_IMG_FLOOR, e)              // naechstes: teils transparent
                           : lerp(P_IMG_FLOOR, 0, clamp(e-1,0,1)); // uebernaechstes: ausblenden
          offY  = e * OFFSET_PX;                                   // weiter unten je groesser e
        }
        fr.img.style.transform =
          'translate(-50%, calc(-50% + ' + (ANCHOR_PX + offY) + 'px)) scale(' + scale + ')';
        fr.img.style.opacity = imgOp;
        fr.el.style.zIndex   = fr.i;      // spaeteres Bild liegt ueber frueherem
        return;
      }

      // === DESKTOP / QUERFORMAT: Filmstreifen nebeneinander ===
      const d  = p - fr.i;              // 0 = aktiv
      const ad = Math.abs(d);

      const scale = lerp(1, SCALE_FLOOR, clamp(ad,0,1));

      let imgOp, txtOp;
      if(ad <= 1){
        imgOp = lerp(1, IMG_FLOOR, ad);
        txtOp = lerp(1, TXT_FLOOR, ad);
      }else{                            // Nachbarn 2. Grades ausblenden
        const t = clamp((ad-1)/0.5, 0, 1);
        imgOp = lerp(IMG_FLOOR, 0, t);
        txtOp = lerp(TXT_FLOOR, 0, t);
      }

      const offsetY = -d * OFFSET_PX;   // konstanter Abstand -> Filmstreifen, nie ueberlappend

      fr.img.style.transform =
        'translate(calc(-50% - ' + IMG_SHIFT + 'px), calc(-50% + ' + offsetY + 'px)) scale(' + scale + ')';
      fr.img.style.opacity = imgOp;

      // Text folgt der SKALIERTEN rechten Bildkante -> Abstand konstant HGAP.
      const textX = scale*IMG_HALF - IMG_SHIFT + HGAP;
      fr.text.style.transform =
        'translate(' + textX + 'px, calc(-50% + ' + offsetY + 'px))';
      fr.text.style.opacity = txtOp;

      fr.el.style.zIndex = Math.round((1-ad)*100);
    });
  }

  // rAF-Drosselung
  let ticking = false;
  function onScroll(){
    if(!ticking){ ticking = true; requestAnimationFrame(()=>{ render(); ticking=false; }); }
  }

  function onResize(){ portrait = readMetrics(); render(); }

  window.addEventListener('scroll', onScroll, {passive:true});
  window.addEventListener('resize', onResize);
  window.addEventListener('orientationchange', onResize);
  window.addEventListener('load', onResize);
  portrait = readMetrics();
  render();
})();
</script>
</body>
</html>
